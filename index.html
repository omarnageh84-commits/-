<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f4f4; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 18px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .name { font-weight: bold; color: #2c3e50; font-size: 16px; margin-bottom: 8px; text-transform: uppercase; }
        .info { font-weight: bold; color: #e67e22; margin-bottom: 5px; }
        .desc { font-size: 15px; color: #555; line-height: 1.5; border-top: 1px solid #eee; padding-top: 8px; }
    </style>
</head>
<body>

<input type="text" id="search" placeholder="ابحث عن دوا..." onkeyup="filter()">
<div class="grid" id="list"></div>

<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzZWUKt3oNr7_IRh0J5H7UirPgMihSMKPLCWk7sreS_A70DKi5CMKflnIPDM3JCzrSERgR5ae1w7aZ/pub?output=csv';

Papa.parse(csvUrl, {
    download: true,
    header: true,
    complete: function(results) {
        const container = document.getElementById('list');
        results.data.forEach(row => {
            // هنا بنفترض إن العناوين في الشيت هي: Name, Price, Category, Description
            // لو العناوين مختلفة قولي أعدلها لك
            const div = document.createElement('div');
            div.className = 'card';
            div.setAttribute('data-cat', row.Category || '');
            div.innerHTML = `
                <div class="name">${row.Name}</div>
                <div class="info">${row.Price}</div>
                <div class="desc">${row.Description}</div>
            `;
            container.appendChild(div);
        });
    }
});

function filter() {
    let val = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
        c.style.display = c.innerText.toLowerCase().includes(val) ? "" : "none";
    });
}
</script>
</body>
</html>
